name: Audit Casks

on:
  push:
    paths:
      - "Casks/**"
  pull_request:
    paths:
      - "Casks/**"

jobs:
  audit:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Tap local repo
        run: brew tap ShiftinBits/homebrew-tap "$(pwd)"

      - name: Audit casks
        run: |
          for f in Casks/*.rb; do
            name=$(basename "$f" .rb)
            brew audit --cask "ShiftinBits/tap/$name"
          done

      - name: Check style
        run: |
          brew style Casks/*.rb
